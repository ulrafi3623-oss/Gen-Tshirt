<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manage Orders | Gen T-shirts</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .status-select {
      padding: 0.35rem;
      border-radius: 4px;
      border: 1px solid var(--color-border);
      font-family: inherit;
      font-size: 0.85rem;
      background: var(--color-surface);
    }
    .filter-bar {
      margin-bottom: 2rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .status-pill {
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 600;
    }
    .status-pill.is-active {
      background: var(--color-primary);
      color: white;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      background: var(--color-surface);
      padding: 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--color-border);
    }
  </style>
</head>
<body class="admin-page">
  <header class="site-header">
    <div class="site-header__inner">
      <span class="logo">Gen T-shirts Admin</span>
      <nav class="nav" style="display: flex; gap: 1rem;">
        <a href="dashboard.html">Dashboard</a>
        <a href="orders.html" style="font-weight: 700;">Orders</a>
      </nav>
    </div>
  </header>

  <main class="container section">
    <h1 class="section__title" style="text-align: left; margin-bottom: 1.5rem;">Order Management</h1>
    <div class="toolbar">
      <div style="display: flex; gap: 0.5rem;">
        <input type="text" id="order-search-input" placeholder="Search orders..." class="status-select" style="min-width: 200px;" />
        <button type="button" class="btn btn--secondary" data-action="search" style="padding: 0.4rem 1rem;">Search</button>
      </div>
      <div style="display: flex; gap: 0.5rem; align-items: center;">
        <select aria-label="Status bulk" class="status-select"></select>
        <select aria-label="Courier bulk" class="status-select"></select>
        <button type="button" class="btn btn--primary" data-action="update-filters" style="padding: 0.4rem 1rem; font-size: 0.85rem;">Apply Bulk</button>
        <button type="button" class="btn btn--secondary" data-action="refresh" title="Refresh">↻</button>
      </div>
    </div>

    <div class="card" style="padding: 0; overflow-x: auto; border-radius: var(--radius-lg);">
      <table style="width: 100%; border-collapse: collapse; min-width: 800px;">
        <thead>
          <tr style="background: var(--color-surface); text-align: left; border-bottom: 2px solid var(--color-border);">
            <th style="padding: 1rem; width: 40px;"><input type="checkbox" data-select-all /></th>
            <th style="padding: 1rem; min-width: 140px;">ID & Date</th>
            <th style="padding: 1rem;">Customer</th>
            <th style="padding: 1rem; width: 60px;">Items</th>
            <th style="padding: 1rem; text-align: right;">Total</th>
            <th style="padding: 1rem;">Payment</th>
            <th style="padding: 1rem;">Due</th>
            <th style="padding: 1rem;">Status</th>
            <th style="padding: 1rem;">Courier</th>
            <th style="padding: 1rem; width: 60px;">Actions</th>
          </tr>
        </thead>
        <tbody id="admin-orders-tbody"></tbody>
      </table>
    </div>
    <div class="table-footer__info" style="margin-top: 1rem; font-size: 0.85rem; color: var(--color-text-muted);"></div>
  </main>

  <div id="admin-toast" style="opacity:0;transition:opacity 0.3s;position:fixed;bottom:1rem;right:1rem;background:var(--color-primary);color:white;padding:1rem;border-radius:8px;z-index:1000;"></div>

  <script src="../js/orders-admin.js"></script>
</body>
<html></html>
