<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard | Gen T-shirts</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="admin-page admin-layout">
  <aside class="sidebar">
    <div class="sidebar__header">
      <div class="logo-wrapper" style="display: flex; flex-direction: column;">
        <span class="logo">Gen T-shirts</span>
        <span class="sidebar__group-label" style="font-size: 0.7rem; color: var(--color-accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;">Control Panel</span>
      </div>
    </div>
    <nav class="sidebar__nav">
      <div class="sidebar__group">Main</div>
      <a href="dashboard.html" class="sidebar__link active">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
        <span>Dashboard</span>
      </a>
      <a href="orders.html" class="sidebar__link">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" /></svg>
        <span>Orders</span>
      </a>
      
      <div class="sidebar__group">Account</div>
      <a href="#" class="sidebar__link">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
        <span>Profile</span>
      </a>
      <a href="#" class="sidebar__link" id="settings-trigger">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 0 1 0 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 0 1-.22.128c-.332.183-.582.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 0 1 0-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
        <span>Settings</span>
      </a>
      
      <div class="sidebar__group">System</div>
      <button class="sidebar__link" id="theme-toggle" style="background:none; border:none; width:100%; text-align:left; cursor:pointer; font-family:inherit;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>
        <span><span id="theme-text">Dark</span> Mode</span>
      </button>
      <a href="../index.html" class="sidebar__link">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
        <span>View Site</span>
      </a>
    </nav>
  </aside>

  <div class="admin-content">
    <header class="admin-topbar">
      <div class="container">
        <div style="display: flex; align-items: center; gap: 1rem; width: 100%;">
          <button id="sidebar-toggle" style="background:none; border:none; cursor:pointer; padding:0.5rem; display:flex; align-items:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color:var(--color-text)"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
          </button>
          <h1 style="font-family: var(--font-serif); font-size: 1.5rem; margin: 0;">Welcome back, Admin</h1>
          <div style="flex: 1;"></div>
          <div style="font-size: 0.85rem; color: var(--color-text-muted);">Today is <span id="current-date"></span></div>
        </div>
      </div>
    </header>

    <main class="container section" style="padding-top: 1rem;">
      <div id="stats-grid" class="cards cards--3">
        <!-- Stats cards will be injected here -->
      </div>

      <section class="section">
        <h2 style="font-family: var(--font-serif); margin-bottom: 1.5rem;">Weekly Sales Trend</h2>
        <div class="card" id="sales-chart-container" style="padding: 2rem; min-height: 250px;"></div>
      </section>

      <section class="section">
        <h2 style="font-family: var(--font-serif); margin-bottom: 1.5rem;">Recent Orders</h2>
        <div class="card" style="padding: 0; overflow-x: auto; border-radius: var(--radius-lg);">
          <table style="width: 100%; border-collapse: collapse; min-width: 600px;">
            <thead>
              <tr style="background: var(--color-surface); text-align: left; border-bottom: 2px solid var(--color-border);">
                <th style="padding: 1rem;">Order ID</th>
                <th style="padding: 1rem;">Date</th>
                <th style="padding: 1rem;">Customer</th>
                <th style="padding: 1rem;">Total</th>
                <th style="padding: 1rem;">Status</th>
              </tr>
            </thead>
            <tbody id="recent-orders-body">
              <tr>
                <td colspan="5" style="padding: 2rem; text-align: center; color: var(--color-text-muted);">Loading orders...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p style="margin-top: 1.5rem; text-align: right;">
          <a href="orders.html" class="btn btn--secondary">Manage all orders →</a>
        </p>
      </section>
    </main>
  </div>

  <script src="../js/orders-store.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
